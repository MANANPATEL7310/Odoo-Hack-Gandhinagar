[build]
builder = "nixpacks"

[phases.install]
cmds = ["corepack enable", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm db:generate", "pnpm build --filter @template/api"]

[deploy]
startCommand = "node apps/api/dist/server.js"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 100
